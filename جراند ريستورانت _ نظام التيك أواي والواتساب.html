<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جراند ريستورانت | نظام الإدارة المتكامل 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --success: #25D366; --danger: #ff4d4d; --gray: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--dark); color: #e0e0e0; overflow-x: hidden; }
        
        header { position: fixed; width: 100%; height: 60px; padding: 0 20px; background: #000; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .logo { font-weight: 800; color: var(--gold); font-size: 1.3rem; }

        .categories-nav { position: fixed; top: 60px; width: 100%; background: #111; display: flex; overflow-x: auto; padding: 12px; gap: 10px; border-bottom: 1px solid #222; z-index: 998; scrollbar-width: none; }
        .cat-tab { background: var(--gray); color: #bbb; border: 1px solid #444; padding: 8px 18px; border-radius: 25px; white-space: nowrap; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .cat-tab.active { background: var(--gold); color: #000; font-weight: bold; }

        .search-container { position: fixed; top: 115px; width: 100%; padding: 10px 5%; background: #0a0a0a; z-index: 997; border-bottom: 1px solid #333; }
        #search-input { width: 100%; padding: 12px; border-radius: 30px; border: 1px solid var(--gold); background: #1a1a1a; color: white; outline: none; text-align: center; }

        .main-content { padding: 190px 5% 100px; max-width: 1200px; margin: 0 auto; }
        .menu-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .meal-card { background: var(--gray); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; position: relative; }
        .meal-info h3 { font-size: 0.9rem; color: #fff; margin-bottom: 5px; }
        .meal-price { color: var(--gold); font-weight: 800; font-size: 1.1rem; }
        .add-qty { background: var(--gold); border: none; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 20px; }

        .panel { position: fixed; left: -100%; top: 0; width: 380px; height: 100%; background: #0d0d0d; z-index: 2000; padding: 20px; transition: 0.5s; border-right: 3px solid var(--gold); display: flex; flex-direction: column; }
        .panel.open { left: 0; box-shadow: 15px 0 50px black; }
        
        .customer-form input { width: 100%; padding: 12px; margin-bottom: 8px; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; }
        .highlight-input { border-color: var(--success) !important; background: #001a00 !important; }

        .cart-list { flex-grow: 1; overflow-y: auto; margin: 10px 0; border-top: 1px solid #222; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }

        .total-box { text-align: center; padding: 15px; background: #111; border-radius: 12px; border: 1px solid var(--gold); margin-bottom: 10px; }
        .total-box h1 { color: var(--gold); font-size: 2.2rem; }

        .actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-whatsapp { background: var(--success); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        .floating-cart { position: fixed; bottom: 30px; right: 30px; background: var(--gold); width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 1500; font-size: 24px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        #cart-badge { position: absolute; top: 0; right: 0; background: red; color: white; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; }

        @media print {
            body * { visibility: hidden; }
            #cart-panel, #cart-panel * { visibility: visible; }
            #cart-panel { position: absolute; left: 0; top: 0; width: 100%; border: none; background: white; color: black; }
            button, .floating-cart, header, .categories-nav, .search-container { display: none !important; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">GRAND RESTAURANT</div>
        <button onclick="toggleReports()" style="background:none; border:1px solid var(--gold); color:var(--gold); padding:5px 10px; border-radius:5px; cursor:pointer;">📊 التقارير</button>
    </header>

    <div class="categories-nav" id="tabs"></div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 ابحث عن صنف معين (كفتة، برجر، نيجرسكو)..." oninput="handleSearch()">
    </div>

    <div id="cart-panel" class="panel">
        <h2 style="color:var(--gold);">🧾 الفاتورة</h2>
        <span onclick="toggleCart()" style="float:left; cursor:pointer; font-size:30px; color:var(--gold);">&times;</span>
        
        <div class="customer-form">
            <input type="number" id="cust-phone" placeholder="رقم موبايل العميل" oninput="lookupCustomer()">
            <input type="text" id="cust-name" placeholder="اسم العميل">
            <input type="text" id="cust-addr" placeholder="العنوان بالتفصيل">
            <div style="background:#1a1a1a; padding:10px; border-radius:8px; border:1px solid #333; margin-bottom:10px;">
                <label style="font-size:0.75rem; color:#888;">خدمة التوصيل (جنية):</label>
                <input type="number" id="delivery-fee" value="0" oninput="updateUI()" style="margin-top:5px; border-color:var(--success);">
            </div>
        </div>

        <div class="cart-list" id="cart-list"></div>

        <div class="total-box">
            <h1 id="grand-total">0</h1>
            <p>جنية مصري</p>
        </div>

        <div class="actions">
            <button class="btn-whatsapp" onclick="sendWhatsApp()">✅ حفظ وإرسال واتساب</button>
            <button class="btn-print" onclick="window.print()">🖨️ طباعة الفاتورة</button>
            <button onclick="clearCart()" style="background:none; color:#555; border:none; cursor:pointer; font-size:0.8rem; margin-top:5px;">مسح السلة 🔄</button>
        </div>
    </div>

    <div id="reports-panel" class="panel">
        <h2>📊 تقرير المبيعات</h2>
        <span onclick="toggleReports()" style="float:left; cursor:pointer; font-size:30px;">&times;</span>
        <div id="reports-content" style="margin:20px 0;"></div>
        <button onclick="resetStats()" style="margin-top:auto; color:red; border:1px solid #333; padding:10px; background:none; border-radius:8px;">تصفير اليومية ⚠️</button>
    </div>

    <div class="main-content">
        <div class="menu-list" id="menu-container"></div>
    </div>

    <div class="floating-cart" onclick="toggleCart()">🛒 <span id="cart-badge">0</span></div>

    <script>
        const menuData = {
            "المشويات": [
                { id: 1, name: "كيلو كفتة حاتي بلدي", price: 480 },
                { id: 2, name: "كيلو كباب وكفتة مشكل", price: 550 },
                { id: 3, name: "كيلو ريش ضاني بلدي", price: 680 },
                { id: 4, name: "كيلو طرب مخصوص", price: 520 },
                { id: 5, name: "نص فرخة مشوية + أرز", price: 185 },
                { id: 6, name: "وجبة شيش طاووق (6 قطع)", price: 160 },
                { id: 7, name: "فرد حمام محشي أرز", price: 130 },
                { id: 8, name: "كيلو سجق مشوي فحم", price: 420 }
            ],
            "بيتزا": [
                { id: 9, name: "بيتزا مارجريتا (كبير)", price: 135 },
                { id: 10, name: "بيتزا سوبر سوبريم (كبير)", price: 210 },
                { id: 11, name: "بيتزا تشيكن رانش (كبير)", price: 220 },
                { id: 12, name: "بيتزا تونة وبصل (كبير)", price: 195 },
                { id: 13, name: "بيتزا مشكل جبن (كبير)", price: 180 },
                { id: 14, name: "بيتزا سي فود (كبير)", price: 290 }
            ],
            "فطائر": [
                { id: 15, name: "فطيرة سجق إسكندراني", price: 170 },
                { id: 16, name: "فطيرة مشكل لحوم شرقي", price: 210 },
                { id: 17, name: "فطيرة كرافت بالعسل", price: 130 },
                { id: 18, name: "فطيرة بسطرمة وجبن", price: 195 },
                { id: 19, name: "فطيرة قشطة وعسل", price: 110 }
            ],
            "المكرونات": [
                { id: 20, name: "مكرونة بشاميل (قطعة كبيرة)", price: 85 },
                { id: 21, name: "مكرونة نيجرسكو دجاج", price: 110 },
                { id: 22, name: "مكرونة وايت صوص وجمبري", price: 190 },
                { id: 23, name: " مكرونة باللحمة المفرومة", price: 75 },
                { id: 24, name: "فوتشيني ألفريدو دجاج", price: 145 },
                { id: 25, name: "مكرونة سبيكة بالصلصة", price: 50 }
            ],
            "طواجن": [  
                { id: 26, name: "طاجن عكاوي بالبصل الأورما", price: 350 },
                { id: 27, name: "طاجن موزة ضاني بالأرز", price: 390 },
                { id: 28, name: "طاجن بامية باللحمة البلدي", price: 210 },
                { id: 29, name: "طاجن ورق عنب بالكوارع", price: 280 },
                { id: 30, name: "طاجن لسان عصفور باللحم", price: 180 },
                { id: 31, name: "طاجن مسقعة باللحم المفروم", price: 140 }
            ],
            "وجبات عائلة": [
                { id: 32, name: "صينية جراند (كفتة+فرخة+أرز+سلطات)", price: 850 },
                { id: 33, name: "صينية الوحش (كيلو مشكل مشويات)", price: 950 },
                { id: 34, name: "وجبة الأكيلة (نص كفتة+فرخة كاملة)", price: 620 },
                { id: 35, name: "صينية ميكس جريل (ريش وكفتة وطرب)", price: 1200 }
            ],
            "سندوتشات": [
                { id: 36, name: "دبل تشيز برجر لحم", price: 150 },
                { id: 37, name: "ساندوتش زنجر سوبريم", price: 125 },
                { id: 38, name: "حواوشي بلدي على الفحم", price: 75 },
                { id: 39, name: "ساندوتش كبدة إسكندراني", price: 55 },
                { id: 40, name: "ساندوتش سجق شرقي مدخن", price: 65 },
                { id: 41, name: "ساندوتش كفتة حاتي كبير", price: 70 }
            ],
            "حلويات": [
                { id: 42, name: "طبق أم علي بالمكسرات", price: 80 },
                { id: 43, name: "أرز بلبن في الفرن", price: 50 },
                { id: 44, name: "كنافة بالنوتيلا (طبق)", price: 95 },
                { id: 45, name: "طاجن نوتيلا وسعادة", price: 120 },
                { id: 46, name: "قطعة بسبوسة سادة", price: 35 }
            ],
            "مشروبات": [
                { id: 47, name: "بيبسي لتر", price: 45 },
                { id: 48, name: "مياه معدنية صغيرة", price: 15 },
                { id: 49, name: "عصير مانجو فريش (كأس)", price: 55 },
                { id: 50, name: "كانز مشروبات غازية", price: 25 },
                { id: 51, name: "براد شاي كبير", price: 40 }
            ]
        };

        let cart = [];
        let activeCat = "المشويات";
        let stats = JSON.parse(localStorage.getItem('grand_final_stats_2026')) || { revenue: 0, orders: 0 };
        let customers = JSON.parse(localStorage.getItem('grand_db_customers')) || {};

        function init() { renderTabs(); showCategory(activeCat); }

        function renderTabs() {
            document.getElementById('tabs').innerHTML = Object.keys(menuData).map(cat => 
                `<div class="cat-tab ${cat === activeCat ? 'active' : ''}" onclick="showCategory('${cat}')">${cat}</div>`).join('');
        }

        function showCategory(cat) {
            activeCat = cat; renderTabs();
            displayMeals(menuData[cat]);
        }

        function displayMeals(list) {
            document.getElementById('menu-container').innerHTML = list.map(m => `
                <div class="meal-card">
                    <div class="meal-info"><h3>${m.name}</h3><div class="meal-price">${m.price} ج</div></div>
                    <button class="add-qty" onclick="addToCart(${m.id},'${m.name}',${m.price})">+</button>
                </div>`).join('');
        }

        function handleSearch() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const all = []; Object.values(menuData).forEach(c => all.push(...c));
            displayMeals(q === '' ? menuData[activeCat] : all.filter(i => i.name.toLowerCase().includes(q)));
        }

        function lookupCustomer() {
            const phone = document.getElementById('cust-phone').value;
            const nameField = document.getElementById('cust-name');
            const addrField = document.getElementById('cust-addr');
            if (customers[phone]) {
                nameField.value = customers[phone].name;
                addrField.value = customers[phone].addr;
                nameField.classList.add('highlight-input');
                addrField.classList.add('highlight-input');
            } else {
                nameField.classList.remove('highlight-input');
                addrField.classList.remove('highlight-input');
            }
        }

        function addToCart(id, name, price) {
            const exist = cart.find(i => i.id === id);
            if(exist) exist.qty++; else cart.push({id, name, price, qty:1});
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map((i, idx) => `
                <div class="cart-item">
                    <span>${i.name} (x${i.qty})</span>
                    <span>${i.price * i.qty}ج <span onclick="remove(${idx})" style="color:red; cursor:pointer; margin-right:5px;">×</span></span>
                </div>`).join('');
            
            const subTotal = cart.reduce((s, i) => s + (i.price * i.qty), 0);
            const delivery = parseInt(document.getElementById('delivery-fee').value) || 0;
            document.getElementById('grand-total').innerText = subTotal + delivery;
            document.getElementById('cart-badge').innerText = cart.reduce((s, i) => s + i.qty, 0);
        }

        function remove(idx) { cart.splice(idx, 1); updateUI(); }
        function toggleCart() { document.getElementById('cart-panel').classList.toggle('open'); }

        function sendWhatsApp() {
            const phone = document.getElementById('cust-phone').value;
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-addr').value;
            const total = document.getElementById('grand-total').innerText;
            const delivery = document.getElementById('delivery-fee').value;

            if(!phone || !name) return alert("يرجى إكمال بيانات العميل");
            if(cart.length === 0) return alert("السلة فارغة");

            customers[phone] = { name: name, addr: addr };
            localStorage.setItem('grand_db_customers', JSON.stringify(customers));

            let msg = `*فـاتـورة جـرانـد ريـسـتـورانـت*\n👤 العميل: ${name}\n📍 العنوان: ${addr || 'تيك أواي'}\n----------\n`;
            cart.forEach(i => msg += `• ${i.name} (x${i.qty}) = ${i.price * i.qty}ج\n`);
            msg += `----------\n🛵 التوصيل: ${delivery} ج\n💰 *الإجمالي: ${total} ج.م*`;

            stats.revenue += parseInt(total); stats.orders += 1;
            localStorage.setItem('grand_final_stats_2026', JSON.stringify(stats));
            window.open(`https://api.whatsapp.com/send?phone=20${phone}&text=${encodeURIComponent(msg)}`);
        }

        function toggleReports() {
            document.getElementById('reports-panel').classList.toggle('open');
            document.getElementById('reports-content').innerHTML = `
                <div style="background:#1a1a1a; padding:15px; border-radius:10px; border-right:4px solid var(--gold);">
                    دخل اليوم: <b style="color:var(--gold)">${stats.revenue} ج.م</b><br>
                    الطلبات: <b>${stats.orders}</b><br>
                    قاعدة بيانات العملاء: <b>${Object.keys(customers).length} عميل</b>
                </div>`;
        }

        function clearCart() { 
            cart = []; 
            document.querySelectorAll('.customer-form input:not(#delivery-fee)').forEach(i => i.value = '');
            updateUI(); 
        }

        function resetStats() { if(confirm("تصفير المبيعات؟")) { stats = {revenue:0, orders:0}; localStorage.setItem('grand_final_stats_2026', JSON.stringify(stats)); toggleReports(); } }

        init();
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
  // بيانات الربط (ستحصل عليها من إعدادات مشروعك في Firebase)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };

  // تهيئة Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // دالة حفظ عميل جديد سحابياً
  function saveCustomerToCloud(phone, data) {
      db.ref('customers/' + phone).set(data);
  }

  // دالة جلب كل العملاء عند فتح البرنامج
  function syncCustomers() {
      db.ref('customers').on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) {
              customers = data; // تحديث قائمة العملاء المحلية من السحابة
              console.log("تم مزامنة بيانات العملاء بنجاح!");
          }
      });
  }
  
  // استدعاء المزامنة عند بدء التشغيل
  syncCustomers();
</script>
</body>
</html>
